name: Android Build

on:
  push:
    branches-ignore: 
      - "main"
      - "master"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Уведомление о старте
    - name: 🚀 Notify Start
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: "⏳ Запуск Debug сборки #${{ github.run_number }}. Ветка: ${{ github.ref_name }}. Подготовка окружения..."

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 2. Уведомление о начале сборки
    - name: 🔨 Notify Build Start
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: "⚙️ Окружение готово. Начинаю компиляцию Debug APK (assembleDebug)..."

    - name: Build with Gradle
      run: |
        set -o pipefail
        ./gradlew assembleDebug --parallel --build-cache 2>&1 | tee build.log

    # 3. Уведомление об успехе компиляции
    - name: ✅ Notify Build Success
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: "✅ Компиляция успешна! Подготавливаю APK к отправке..."

    # Шаг для дебага: выводит структуру папок, чтобы визуально видеть, где лежит APK
    - name: 📂 Show outputs directory tree
      run: |
        sudo apt-get install tree -y
        tree app/build/outputs || echo "Директория outputs не найдена"

    # Находим APK, переименовываем и сохраняем путь
    - name: 🔎 Find and Rename APK
      id: prepare_apk
      run: |
        # Ищем любой .apk файл в папке outputs
        APK_OLD_PATH=$(find app/build/outputs/apk -name "*.apk" | head -n 1)
        
        # Если файл не найден, роняем сборку с понятной ошибкой
        if [ -z "$APK_OLD_PATH" ]; then
          echo "❌ APK файл не найден! Проверь логи шага 'Show outputs directory tree'."
          exit 1
        fi
        
        # Переименовываем
        DIR_NAME=$(dirname "$APK_OLD_PATH")
        APK_NEW_PATH="$DIR_NAME/app-debug-${{ github.run_number }}.apk"
        mv "$APK_OLD_PATH" "$APK_NEW_PATH"
        
        # Сохраняем новый путь в переменные окружения для следующих шагов
        echo "APK_FINAL_PATH=$APK_NEW_PATH" >> $GITHUB_ENV

    - name: 📦 Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ github.run_number }}
        path: ${{ env.APK_FINAL_PATH }}
        if-no-files-found: error # Теперь шаг упадет, если файла нет!

    - name: 🚀 Send APK to Telegram
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        document: ${{ env.APK_FINAL_PATH }}
        message: "🚀 Сборка успешно завершена! Ветка: ${{ github.ref_name }} (Build #${{ github.run_number }})"

    # --- БЛОК ОБРАБОТКИ ОШИБОК ---
    - name: Extract Error Log
      if: failure()
      run: |
        echo "ERROR_LOG<<EOF" >> $GITHUB_ENV
        # Защита на случай, если сборка упадет до создания build.log
        tail -n 30 build.log >> $GITHUB_ENV || echo "Лог сборки Gradle недоступен (ошибка на этапе подготовки)" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Notify Telegram on Failure
      if: failure()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ❌ Ошибка сборки Debug!
          Ветка: ${{ github.ref_name }} (Build #${{ github.run_number }})
          Автор: ${{ github.actor }}
          
          📝 Последние строки лога:
          `${{ env.ERROR_LOG }}`
          
          🔍 Полные логи: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}