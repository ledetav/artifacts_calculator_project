name: Android Build

on:
  push:
    branches-ignore: 
      - "main"
      - "master"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Уведомление о старте
    - name: 🚀 Notify Start
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: "⏳ Запуск Debug сборки #${{ github.run_number }}. Ветка: ${{ github.ref_name }}. Подготовка окружения..."

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 2. Уведомление о начале сборки
    - name: 🔨 Notify Build Start
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: "⚙️ Окружение готово. Начинаю компиляцию Debug APK (assembleDebug)..."

    - name: Build with Gradle
      run: |
        set -o pipefail
        ./gradlew assembleDebug --parallel --build-cache 2>&1 | tee build.log

    # 3. Уведомление об успехе компиляции
    - name: ✅ Notify Build Success
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: "✅ Компиляция успешна! Подготавливаю APK к отправке..."

    - name: 📂 Show outputs directory tree
      run: |
        sudo apt-get install tree -y
        tree app/build/outputs || echo "Директория outputs не найдена"

    # Находим конкретно arm64-v8a APK, переименовываем и проверяем размер
    - name: 🔎 Find, Rename and Check Size
      id: prepare_apk
      run: |
        APK_OLD_PATH=$(find app/build/outputs/apk -name "*arm64-v8a*.apk" | head -n 1)
        
        if [ -z "$APK_OLD_PATH" ]; then
          echo "❌ APK файл arm64-v8a не найден!"
          exit 1
        fi
        
        DIR_NAME=$(dirname "$APK_OLD_PATH")
        APK_NEW_PATH="$DIR_NAME/app-debug-${{ github.run_number }}.apk"
        mv "$APK_OLD_PATH" "$APK_NEW_PATH"
        
        echo "APK_FINAL_PATH=$APK_NEW_PATH" >> $GITHUB_ENV
        
        FILE_SIZE=$(stat -c%s "$APK_NEW_PATH")
        echo "Размер APK: $FILE_SIZE байт"
        
        if [ "$FILE_SIZE" -gt 52428800 ]; then
          echo "Файл больше 50 МБ. Устанавливаем флаг IS_LARGE_APK=true"
          echo "IS_LARGE_APK=true" >> $GITHUB_ENV
        else
          echo "Файл меньше 50 МБ. Устанавливаем флаг IS_LARGE_APK=false"
          echo "IS_LARGE_APK=false" >> $GITHUB_ENV
        fi

    - name: 📦 Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ github.run_number }}
        path: ${{ env.APK_FINAL_PATH }}
        if-no-files-found: error

    # 4a. Финальный успех (отправка ФАЙЛА, если размер <= 50 МБ)
    - name: 🚀 Send APK File to Telegram
      if: env.IS_LARGE_APK == 'false'
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        document: ${{ env.APK_FINAL_PATH }}
        message: "🚀 Сборка успешно завершена! Ветка: ${{ github.ref_name }} (Build #${{ github.run_number }})"

    # 4b. Загрузка большого APK на Litterbox (Catbox.moe)
    - name: ☁️ Upload Large APK to Temporary Storage
      if: env.IS_LARGE_APK == 'true'
      id: upload_temp
      run: |
        echo "Загружаю APK на сервер Litterbox (до 1 ГБ)..."
        
        DIRECT_LINK=$(curl -s -F "reqtype=fileupload" -F "time=72h" -F "fileToUpload=@${{ env.APK_FINAL_PATH }}" https://litterbox.catbox.moe/resources/internals/api.php)
        
        if [[ ! "$DIRECT_LINK" == http* ]]; then
          echo "❌ Ошибка загрузки: $DIRECT_LINK"
          exit 1
        fi
        
        echo "Прямая ссылка: $DIRECT_LINK"
        echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_ENV

    # 4c. Финальный успех (отправка ССЫЛКИ, если размер > 50 МБ)
    - name: 🔗 Send Direct APK Link to Telegram
      if: env.IS_LARGE_APK == 'true'
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          🚀 Сборка успешно завершена! Ветка: ${{ github.ref_name }} (Build #${{ github.run_number }})
          
          ⚠️ Размер APK превышает лимит Telegram (50 МБ).
          📥 Прямая ссылка на скачивание APK (действительна 3 дня):
          ${{ env.DIRECT_LINK }}
          
          📦 Резервный ZIP-архив всегда доступен в GitHub Actions:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    # --- БЛОК ОБРАБОТКИ ОШИБОК ---
    - name: Extract Error Log
      if: failure()
      run: |
        echo "ERROR_LOG<<EOF" >> $GITHUB_ENV
        tail -n 30 build.log >> $GITHUB_ENV || echo "Лог сборки        # Загружаем файл (time=72h означает, что ссылка сгорит через 3 дня)
        DIRECT_LINK=$(curl -s -F "reqtype=fileupload" -F "time=72h" -F "fileToUpload=@${{ env.APK_FINAL_PATH }}" https://litterbox.catbox.moe/resources/internals/api.php)
        
        # Проверяем, что ответ начинается с "http" (успех)
        if [[ ! "$DIRECT_LINK" == http* ]]; then
          echo "❌ Ошибка загрузки: $DIRECT_LINK"
          exit 1
        fi
        
        echo "Прямая ссылка: $DIRECT_LINK"
        echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_ENV

    # 4c. Финальный успех (отправка ССЫЛКИ, если размер > 50 МБ)
    - name: 🔗 Send Direct APK Link to Telegram
      if: env.IS_LARGE_APK == 'true'
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          🚀 Сборка успешно завершена! Ветка: ${{ github.ref_name }} (Build #${{ github.run_number }})
          
          ⚠️ Размер APK превышает лимит Telegram (50 МБ).
          📥 Прямая ссылка на скачивание APK (действительна 3 дня):
          ${{ env.DIRECT_LINK }}
          
          📦 Резервный ZIP-архив всегда доступен в GitHub Actions:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    # --- БЛОК ОБРАБОТКИ ОШИБОК ---
    - name: Extract Error Log
      if: failure()
      run: |
        echo "ERROR_LOG<<EOF" >> $GITHUB_ENV
        tail -n 30 build.log >> $GITHUB_ENV || echo "Лог сборки Gradle недоступен" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Notify Telegram on Failure
      if: failure()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ❌ Ошибка сборки Debug!
          Ветка: ${{ github.ref_name }} (Build #${{ github.run_number }})
          Автор: ${{ github.actor }}
          
          📝 Последние строки лога:
          `${{ env.ERROR_LOG }}`
          
          🔍 Полные логи: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}        DIRECT_LINK=$(curl -s --fail --upload-file ${{ env.APK_FINAL_PATH }} https://transfer.sh/app-debug-${{ github.run_number }}.apk)
        
        if [ -z "$DIRECT_LINK" ]; then
          echo "❌ Ошибка: Не удалось получить ссылку от transfer.sh"
          exit 1
        fi
        
        echo "Прямая ссылка: $DIRECT_LINK"
        echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_ENV

    # 4c. Финальный успех (отправка ССЫЛКИ, если размер > 50 МБ)
    - name: 🔗 Send Direct APK Link to Telegram
      if: env.IS_LARGE_APK == 'true'
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          🚀 Сборка успешно завершена! Ветка: ${{ github.ref_name }} (Build #${{ github.run_number }})
          
          ⚠️ Размер APK превышает лимит Telegram (50 МБ).
          📥 Прямая ссылка на скачивание APK (действительна 14 дней):
          ${{ env.DIRECT_LINK }}
          
          📦 Резервный ZIP-архив всегда доступен в GitHub Actions:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    # --- БЛОК ОБРАБОТКИ ОШИБОК ---
    - name: Extract Error Log
      if: failure()
      run: |
        echo "ERROR_LOG<<EOF" >> $GITHUB_ENV
        tail -n 30 build.log >> $GITHUB_ENV || echo "Лог сборки Gradle недоступен" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Notify Telegram on Failure
      if: failure()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ❌ Ошибка сборки Debug!
          Ветка: ${{ github.ref_name }} (Build #${{ github.run_number }})
          Автор: ${{ github.actor }}
          
          📝 Последние строки лога:
          `${{ env.ERROR_LOG }}`
          
          🔍 Полные логи: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
