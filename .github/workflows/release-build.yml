name: Release Build & TG Deploy

on:
  pull_request:
    types: [closed]
    branches: [ "main", "master" ]

jobs:
  build-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
    - name: 🚀 Notify Start
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: "⏳ Запуск сборки Релиза 1.0.${{ github.run_number }}. Подготовка окружения..."

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: 🗄️ Cache C++ build (.cxx)
      uses: actions/cache@v4
      with:
        path: app/.cxx
        # Ключ обновляется при изменении CMakeLists или любых C/C++ файлов
        key: ${{ runner.os }}-cxx-${{ hashFiles('**/CMakeLists.txt', '**/*.cpp', '**/*.hpp', '**/*.c', '**/*.h') }}
        # Если точного совпадения нет, берем последний доступный кэш для этой ОС
        restore-keys: |
          ${{ runner.os }}-cxx-

    - name: 🔨 Notify Build Start
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: "⚙️ Окружение готово. Начинаю компиляцию APK (assembleRelease)..."

    - name: Build Release APK
      run: |
        set -o pipefail
        ./gradlew assembleRelease -PversionCode=${{ github.run_number }} --parallel --build-cache 2>&1 | tee build.log

    - name: Install Android Build Tools 29.0.3
      run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;29.0.3"
      
    - name: 🔑 Notify Sign Start
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: "✅ Компиляция успешна! Начинаю подпись релизного APK..."

    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app 
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Rename Signed APK
      id: rename_apk
      run: |
        ORIGINAL_FILE="${{ steps.sign_app.outputs.signedReleaseFile }}"
        NEW_FILE="app-release-1.0.${{ github.run_number }}.apk"
        mv "$ORIGINAL_FILE" "$NEW_FILE"
        echo "apk_path=$NEW_FILE" >> $GITHUB_OUTPUT

    - name: Send Signed Release APK to Telegram
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        document: ${{ steps.rename_apk.outputs.apk_path }}
        message: "🎉 Новый Релиз готов и подписан (Версия: 1.0.${{ github.run_number }})!"

    # --- БЛОК ОБРАБОТКИ ОШИБОК ---

    - name: Catch Signing Error
      if: failure() && steps.sign_app.outcome == 'failure'
      run: |
        echo "ERROR_LOG<<EOF" >> $GITHUB_ENV
        echo "Критическая ошибка при подписании APK." >> $GITHUB_ENV
        echo "Возможные причины: неверный KEYSTORE_BASE64, KEY_ALIAS или пароли в Secrets." >> $GITHUB_ENV
        echo "Убедитесь, что base64-строка не содержит лишних пробелов." >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Extract Build Error Log
      if: failure() && steps.sign_app.outcome != 'failure'
      run: |
        echo "ERROR_LOG<<EOF" >> $GITHUB_ENV
        tail -n 30 build.log >> $GITHUB_ENV || echo "Лог сборки Gradle недоступен (ошибка на другом этапе)" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Notify Telegram on Failure
      if: failure()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ❌ Ошибка сборки Релиза! 
          Версия: 1.0.${{ github.run_number }}
          Автор: ${{ github.actor }}
          
          📝 Детали:
          `${{ env.ERROR_LOG }}`
          
          🔍 Полные логи: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}